name: CI

on:
    workflow_call:
    workflow_dispatch:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

permissions:
    contents: read
    pull-requests: write

jobs:
    build:
        name: Build and test on macOS ${{ matrix.macos }} with Xcode ${{ matrix.xcode }}
        runs-on: macos-${{ matrix.macos }}
        env:
            DEVELOPER_DIR: "/Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer"
        strategy:
            fail-fast: false
            matrix:
                include:
                    - macos: "26"
                      xcode: "26.0"
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Cache Xcode build artifacts
              uses: actions/cache@v5
              with:
                  path: |
                      ~/Library/Developer/Xcode/DerivedData
                      ~/Library/Caches/org.swift.swiftpm
                  key: ${{ runner.os }}-xcode-${{ matrix.xcode }}-derived-${{ hashFiles('**/Package.resolved') }}
                  restore-keys: |
                      ${{ runner.os }}-xcode-${{ matrix.xcode }}-derived-

            - name: Lint
              run: swift format lint --strict --recursive .

            - name: Build
              run: xcodebuild -quiet -project "Apple Core.xcodeproj" -scheme "Apple Core" -configuration Debug -destination "platform=macOS" build

            - name: Unit tests
              run: xcodebuild -quiet -project "Apple Core.xcodeproj" -scheme "Apple Core" -configuration Debug -destination "platform=macOS" test
              # Integration tests gated behind RUN_INTEGRATION_TESTS=1 (per docs/planning/BUILD_PLAN.md §3.2)
              # are intentionally not run here — they require a real iCloud test account and are run manually.

    secrets:
        name: Scan full history for secrets
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout full history
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v3
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
